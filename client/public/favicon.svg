<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Dark background matching app sidebar -->
  <rect width="32" height="32" rx="8" fill="#141414"/>

  <!-- Ascending bar chart — mirrors the dashboard's spending trend chart -->
  <!-- Bar 1: shortest (left) -->
  <rect x="5" y="20" width="6" height="8" rx="1.5" fill="#A8812C"/>
  <!-- Bar 2: medium (center) -->
  <rect x="13" y="14" width="6" height="14" rx="1.5" fill="#C49A3C"/>
  <!-- Bar 3: tallest (right) — brightest gold, the "peak" -->
  <rect x="21" y="7" width="6" height="21" rx="1.5" fill="#D4A853"/>
</svg>
